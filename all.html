<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FIDO Security Keys</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="brands.css">
</head>
<body>
  <header>
    <div class="header-content">
      <h1>FIDO Security Keys</h1>
      <p class="subtitle">Certified <a href="https://fidoalliance.org/certification/authenticator-certification-levels/" target="_blank">FIDO2 authenticators</a></p>
      <div class="search-box">
        <svg class="search-icon" viewBox="0 0 20 20" fill="currentColor" width="18" height="18"><path fill-rule="evenodd" d="M9 3.5a5.5 5.5 0 100 11 5.5 5.5 0 000-11zM2 9a7 7 0 1112.45 4.39l4.26 4.27a.75.75 0 11-1.06 1.06l-4.27-4.26A7 7 0 012 9z" clip-rule="evenodd"/></svg>
        <input type="text" id="search-input" placeholder="Search security keys..." autocomplete="off">
      </div>
      <nav class="view-toggle">
        <a href="index.html" class="view-link">By Brand</a>
        <a href="all.html" class="view-link active">All Keys</a>
      </nav>
    </div>
  </header>

  <main>
    <div class="results-info">
      <span id="results-count"></span>
    </div>

    <div id="card-grid" class="card-grid">
      <div class="loading">Loading security keys...</div>
    </div>

    <div id="device-modal" class="modal hidden" role="dialog" aria-modal="true">
      <div class="modal-backdrop" id="modal-backdrop"></div>
      <div class="modal-content" id="modal-content"></div>
    </div>
  </main>

  <footer>
    <p id="legal-header"></p>
    <p id="metadata-version" class="footer-meta"></p>
  </footer>

  <script src="main.js"></script>
</body>
</html>
